# Unified finetune config for full end-to-end PhoWhisper-medium training
# on a single RTX 3090 24GB.
#
# This is a conservative test config:
# - full finetune enabled (`freeze_encoder: false`)
# - very small micro-batch to reduce OOM risk
# - larger gradient accumulation to preserve effective batch size
#
# If you still hit OOM:
# 1. reduce `gradient_accumulation_steps` only if runtime is too slow
# 2. keep `batch_size: 1`
# 3. lower `dataloader_num_workers` to 1
# 4. disable augmentation temporarily
#
# Model source:
# https://huggingface.co/vinai/PhoWhisper-medium

model:
  name: "vinai/PhoWhisper-medium"
  num_genders: 2
  num_dialects: 3
  dropout: 0.15
  head_hidden_dim: 512
  freeze_encoder: false

audio:
  sampling_rate: 16000
  # Whisper/PhoWhisper in this repo is internally normalized to 30s input.
  max_duration: 5

training:
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.5e-5
  num_epochs: 8
  warmup_ratio: 0.08
  weight_decay: 0.01
  gradient_clip: 0.5
  lr_scheduler: "cosine"
  fp16: true
  dataloader_num_workers: 2
  resume_from_checkpoint: null

augmentation:
  enabled: true
  prob: 0.75

loss:
  dialect_weight: 4.0

wandb:
  enabled: false
  api_key: null
  project: "speaker-profiling-unified"
  run_name: "phowhisper-medium-full-unified"

data:
  source: "unified"

  unified:
    enabled_sources:
      - vimd
      - lsvsc
      - visec

    train_merge_strategy: "balanced_concat"

    sampling_probs:
      vimd: 0.4
      lsvsc: 0.4
      visec: 0.2

    vimd:
      enabled: true
      path: "nguyendv02/ViMD_Dataset"

    lsvsc:
      enabled: true
      path: "doof-ferb/LSVSC"
      dialect_map:
        northern dialect: North
        central dialect: Central
        southern dialect: South

    visec:
      enabled: true
      path: "hustep-lab/ViSEC"
      val_split: 0.1
      test_split: 0.1
      split_seed: 42

output:
  dir: "output/unified-phowhisper-medium-full"
  save_total_limit: 2
  metric_for_best_model: "dialect_acc"

early_stopping:
  patience: 3
  threshold: 0.001

labels:
  gender:
    Male: 0
    Female: 1
    0: 0
    1: 1
  dialect:
    North: 0
    Central: 1
    South: 2
  region_to_dialect:
    North: 0
    Central: 1
    South: 2

seed: 42
